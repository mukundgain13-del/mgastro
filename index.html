<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGASTRO - AI Kundli</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-4">

    <div class="text-center my-8">
        <div class="bg-orange-600 text-white w-14 h-14 flex items-center justify-center rounded-2xl text-3xl font-bold mx-auto mb-2 shadow-lg">M</div>
        <h1 class="text-3xl font-black text-slate-800 tracking-tighter">MGASTRO</h1>
    </div>

    <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl border border-slate-200">
        
        <div id="step-1">
            <h2 class="text-center text-slate-700 font-bold mb-8 text-xl">अपनी विस्तृत कुंडली रिपोर्ट प्राप्त करें</h2>
            <div class="space-y-5">
                <input type="text" id="userName" placeholder="अपना नाम यहाँ लिखें" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-orange-500 outline-none transition-all">
                <input type="date" id="userDob" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-orange-500 outline-none transition-all">
                <button onclick="generateReport()" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-black py-5 rounded-2xl shadow-lg transition-transform active:scale-95">
                    कुंडली देखें
                </button>
            </div>
        </div>

        <div id="step-loading" class="hidden text-center py-12">
            <div class="animate-bounce mb-4 text-4xl">🔮</div>
            <p class="text-slate-600 font-bold">ग्रहों की गणना हो रही है, कृपया प्रतीक्षा करें...</p>
        </div>

        <div id="step-result" class="hidden">
            <div class="bg-orange-50 rounded-2xl p-6 border-l-8 border-orange-500 mb-6">
                <div id="reportOutput" class="text-slate-800 leading-relaxed whitespace-pre-wrap font-medium"></div>
            </div>
            
            <button onclick="location.reload()" class="w-full py-4 bg-slate-100 text-slate-600 font-bold rounded-2xl hover:bg-slate-200 transition-colors">
                ← दूसरी कुंडली देखें
            </button>
        </div>
    </div>

    <script>
        async function generateReport() {
            const name = document.getElementById('userName').value;
            const dob = document.getElementById('userDob').value;
            
            if(!name || !dob) { alert("कृपया नाम और जन्मतिथि भरें"); return; }

            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-loading').classList.remove('hidden');

            try {
                const res = await fetch("https://api.together.xyz/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer 815c30800b411df83e586027a7604561858a7f45778a3c5a6988941f6f87491d",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "meta-llama/Llama-3-70b-chat-hf",
                        messages: [{
                            role: "system",
                            content: "You are a professional Vedic Astrologer. Give a detailed, long horoscope in Hindi. Use headings for Personality, Career, and Health."
                        }, {
                            role: "user",
                            content: `Name: ${name}, DOB: ${dob}. Provide a 400-word deep analysis in Hindi.`
                        }]
                    })
                });

                const data = await res.json();
                
                if (data.choices && data.choices[0]) {
                    document.getElementById('step-loading').classList.add('hidden');
                    document.getElementById('step-result').classList.remove('hidden');
                    document.getElementById('reportOutput').innerText = data.choices[0].message.content;
                } else {
                    throw new Error("Data not found");
                }

            } catch (e) {
                document.getElementById('step-loading').classList.add('hidden');
                document.getElementById('step-1').classList.remove('hidden');
                alert("सर्वर अभी व्यस्त है, कृपया एक बार फिर प्रयास करें।");
            }
        }
    </script>
</body>
</html>
