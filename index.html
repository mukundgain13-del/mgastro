<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGASTRO - AI Kundli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center p-4">

    <div class="text-center my-6">
        <div class="bg-orange-600 text-white w-12 h-12 flex items-center justify-center rounded-lg text-2xl font-bold mx-auto mb-2">M</div>
        <h1 class="text-2xl font-bold text-slate-800 tracking-tight">MGASTRO</h1>
    </div>

    <div class="glass w-full max-w-md p-8 border border-white">
        
        <div id="step-1">
            <h2 class="text-center text-slate-700 font-semibold mb-6">फ्री कुंडली रिपोर्ट</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">नाम</label>
                    <input type="text" id="name" placeholder="अपना नाम लिखें" class="w-full p-3 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-orange-500 outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">जन्मतिथि</label>
                    <input type="date" id="dob" class="w-full p-3 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-orange-500 outline-none">
                </div>
                <button onclick="getKundli()" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-orange-200 transition-all active:scale-95">
                    कुंडली देखें
                </button>
            </div>
        </div>

        <div id="step-loader" class="hidden text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-600 mx-auto"></div>
            <p class="mt-4 text-slate-600 font-medium italic text-sm">ग्रहों की गणना की जा रही है...</p>
        </div>

        <div id="step-result" class="hidden">
            <div class="bg-orange-50 border-t-4 border-orange-500 rounded-2xl p-6 mb-6">
                <p id="output" class="text-slate-700 leading-relaxed text-sm whitespace-pre-wrap"></p>
            </div>
            
            <div class="text-center bg-yellow-50 p-4 rounded-xl border border-yellow-200 mb-4">
                <p class="text-xs font-bold text-yellow-700 mb-2">पूरी 10 पेज की महा-कुंडली रिपोर्ट के लिए</p>
                <a href="upi://pay?pa=mukundgain13-1@okaxis&pn=Mukund%20Gain&am=199&cu=INR" class="inline-block bg-green-600 text-white px-6 py-2 rounded-full font-bold text-sm shadow-md">
                    अभी ₹199 भुगतान करें
                </a>
            </div>

            <button onclick="location.reload()" class="w-full py-3 text-orange-600 font-bold text-sm">वापस जाएँ</button>
        </div>
    </div>

    <script>
        const T_KEY = "key_CacUgD1wXk8JhS7WcGkCW"; 

        async function getKundli() {
            const name = document.getElementById('name').value;
            const dob = document.getElementById('dob').value;
            
            if(!name || !dob) { alert("कृपया नाम और जन्मतिथि भरें"); return; }

            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-loader').classList.remove('hidden');

            try {
                const response = await fetch("https://api.together.xyz/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${T_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "meta-llama/Llama-3-70b-chat-hf",
                        messages: [{
                            role: "system",
                            content: "You are a professional Vedic Astrologer. Give a detailed and long horoscope report in Hindi (at least 300-400 words)."
                        }, {
                            role: "user",
                            content: `Name: ${name}, DOB: ${dob}. कृपया इनके व्यक्तित्व, करियर, धन और स्वास्थ्य पर विस्तार से लिखें।`
                        }]
                    })
                });

                const data = await response.json();
                document.getElementById('step-loader').classList.add('hidden');
                document.getElementById('step-result').classList.remove('hidden');
                document.getElementById('output').innerText = data.choices[0].message.content;

            } catch (error) {
                alert("नेटवर्क एरर! कृपया दोबारा कोशिश करें।");
                location.reload();
            }
        }
    </script>
</body>
</html>
