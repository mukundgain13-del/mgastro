<script>
    const T_KEY = "key_CacUgD1wXk8JhS7WcGkCW"; 
    const A_KEY = "ak-ecab78926aa2f1c02c390657c0bd73654a269e78";

    async function getKundli() {
        const name = document.getElementById('name').value;
        const dob = document.getElementById('dob').value;
        
        if(!name || !dob) { 
            alert("कृपया नाम और जन्मतिथि भरें"); 
            return; 
        }

        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-loader').classList.remove('hidden');

        try {
            // Together AI को असली और बड़ी रिपोर्ट के लिए कॉल करना
            const response = await fetch("https://api.together.xyz/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${T_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "meta-llama/Llama-3-70b-chat-hf",
                    messages: [{
                        role: "system",
                        content: "You are a professional Vedic Astrologer. Give a very detailed 500-word horoscope report in Hindi."
                    }, {
                        role: "user",
                        content: `Name: ${name}, DOB: ${dob}. कृपया इनके लिए करियर, स्वास्थ्य, धन और परिवार पर एक विस्तृत कुंडली रिपोर्ट तैयार करें और विशेष उपाय भी बताएं।`
                    }]
                })
            });

            const data = await response.json();
            const aiReport = data.choices[0].message.content;

            document.getElementById('step-loader').classList.add('hidden');
            document.getElementById('step-result').classList.remove('hidden');
            document.getElementById('output').innerText = aiReport;

        } catch (error) {
            document.getElementById('output').innerText = "क्षमा करें, गणना में त्रुटि हुई। कृपया दोबारा प्रयास करें।";
        }
    }
</script>
