<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGASTRO - AI Kundli</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-orange-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="text-center mb-6">
        <div class="bg-orange-600 text-white w-14 h-14 flex items-center justify-center rounded-2xl text-3xl font-bold mx-auto mb-2 shadow-lg">M</div>
        <h1 class="text-3xl font-black text-slate-800 tracking-tighter">MGASTRO</h1>
    </div>

    <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl border border-orange-100">
        
        <div id="input-section">
            <h2 class="text-center text-slate-700 font-bold mb-8 text-xl">मुफ्त कुंडली रिपोर्ट</h2>
            <div class="space-y-5">
                <input type="text" id="nameInput" placeholder="अपना नाम लिखें" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-orange-500 outline-none">
                <input type="date" id="dobInput" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-orange-500 outline-none">
                <button onclick="getReport()" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-black py-5 rounded-2xl shadow-lg transition-transform active:scale-95">
                    कुंडली देखें
                </button>
            </div>
        </div>

        <div id="loader" class="hidden text-center py-12">
            <div class="animate-bounce mb-4 text-4xl">🔮</div>
            <p class="text-slate-600 font-bold">AI गणना कर रहा है, कृपया रुकें...</p>
        </div>

        <div id="result-section" class="hidden">
            <div class="bg-orange-50 rounded-2xl p-6 border-l-8 border-orange-500 mb-6 max-h-96 overflow-y-auto">
                <div id="reportText" class="text-slate-800 leading-relaxed whitespace-pre-wrap font-medium"></div>
            </div>
            <button onclick="location.reload()" class="w-full py-4 bg-slate-100 text-slate-600 font-bold rounded-2xl hover:bg-slate-200">
                ← वापस जाएँ
            </button>
        </div>
    </div>

    <script>
        async function getReport() {
            const name = document.getElementById('nameInput').value;
            const dob = document.getElementById('dobInput').value;
            
            if(!name || !dob) { 
                alert("कृपया पूरी जानकारी भरें"); 
                return; 
            }

            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');

            try {
                const response = await fetch("https://api.together.xyz/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer 815c30800b411df83e586027a7604561858a7f45778a3c5a6988941f6f87491d",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "meta-llama/Llama-3-70b-chat-hf",
                        messages: [
                            { role: "system", content: "You are a senior Indian Astrologer. Give a detailed, 400-word horoscope in Hindi with sections for Personality, Career, and Wealth." },
                            { role: "user", content: `Name: ${name}, DOB: ${dob}. Provide a full reading.` }
                        ]
                    })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('result-section').classList.remove('hidden');
                    document.getElementById('reportText').innerText = data.choices[0].message.content;
                } else {
                    throw new Error("Invalid API Response");
                }

            } catch (err) {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('input-section').classList.remove('hidden');
                alert("सर्वर अभी थोड़ा धीमा है, कृपया एक बार फिर बटन दबाएँ।");
            }
        }
    </script>
</body>
</html>
