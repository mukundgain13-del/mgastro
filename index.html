<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGASTRO - डैशबोर्ड</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen flex flex-col items-center">
    <div class="text-center mt-8 mb-6">
        <div class="bg-blue-800 text-white w-16 h-16 flex items-center justify-center rounded-full text-2xl font-black mx-auto mb-1 border-2 border-blue-900 shadow-lg">MG</div>
        <p class="text-[10px] font-bold text-blue-900 tracking-widest uppercase">mgastro</p>
    </div>

    <div class="w-full max-w-md px-6 text-center mb-10">
        <div class="flex flex-col items-center gap-3">
            <button onclick="window.location.href='form.html'" class="bg-blue-700 text-white font-black py-4 px-10 rounded-2xl shadow-xl text-2xl active:scale-95 transition-all">
                कुंडली
            </button>
            <span class="text-sm font-bold text-slate-500">(विस्तृत रिपोर्ट प्राप्त करें - 101 Rs.)</span>
        </div>
    </div>

    <div class="w-full bg-gradient-to-b from-blue-900 to-blue-700 flex-grow p-10 rounded-t-[3.5rem] text-white">
        <div class="max-w-md mx-auto space-y-8 text-center">
            <h2 class="text-2xl font-black italic">"आपका भविष्य आपके हाथों में"</h2>
            <div class="text-left space-y-4 text-blue-50 font-medium">
                <p>✅ व्यक्तित्व: अपनी असली शक्तियों को पहचानें।</p>
                <p>✅ करियर: सफलता और धन लाभ के सटीक योग।</p>
                <p>✅ उपाय: जीवन की बाधाओं को दूर करने के तरीके।</p>
            </div>
            <div class="pt-8 border-t border-blue-400/40">
                <p class="text-sm font-bold italic text-blue-200 uppercase">
                    "आप इस विस्तृत जानकारी के लिए छोटा सा योगदान देकर अपनी कुंडली प्राप्त कर सकते हैं।"
                </p>
            </div>
        </div>
    </div>
</body>
</html>
